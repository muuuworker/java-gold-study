name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # main ブランチへの push で自動デプロイ
  workflow_dispatch: # GitHub UI から手動でも実行できる

# GitHub Pages へのデプロイに必要なパーミッション
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐ（前のデプロイが完了してから次を実行）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # docs/ フォルダをそのままアップロード（ビルド不要）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
